<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Browse Jobs</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Header -->

<section class="bg-primary text-white py-5">

  <div class="container">

    <h1 class="fw-bold">

      Find Your Dream Job

    </h1>

    <p class="lead">

      Browse thousands of verified job opportunities.

    </p>

  </div>

</section>

<!-- Search -->

<section class="py-4 bg-light">

  <div class="container">

    <form class="row g-3">

      <div class="col-lg-5">

        <input
                type="text"
                class="form-control form-control-lg"
                placeholder="Job title or keyword">

      </div>

      <div class="col-lg-3">

        <input
                type="text"
                class="form-control form-control-lg"
                placeholder="Location">

      </div>

      <div class="col-lg-2">

        <select class="form-select form-select-lg">

          <option>All Types</option>
          <option>Full Time</option>
          <option>Part Time</option>
          <option>Internship</option>
          <option>Remote</option>

        </select>

      </div>

      <div class="col-lg-2">

        <button class="btn btn-primary btn-lg w-100">

          <i class="bi bi-search"></i>

          Search

        </button>

      </div>

    </form>

  </div>

</section>

<!-- Jobs -->

<section class="py-5">

  <div class="container">

    <div class="row">

      <div class="col-lg-4 mb-4"
           th:each="job : ${jobs}">

        <div class="card shadow-sm border-0 h-100 job-card">

          <div class="card-body">

            <div class="d-flex justify-content-between">

                            <span
                                    class="badge bg-primary"
                                    th:text="${job.jobType}">
                                Full Time
                            </span>

              <span class="text-warning">

                                <i class="bi bi-bookmark"></i>

                            </span>

            </div>

            <h4 class="mt-3 fw-bold"
                th:text="${job.title}">

              Java Developer

            </h4>

            <p class="text-muted">

              <i class="bi bi-building"></i>

              <span th:text="${job.company.companyName}">
                                Company
                            </span>

            </p>

            <p>

              <i class="bi bi-geo-alt-fill text-danger"></i>

              <span th:text="${job.location}">
                                Ahmedabad
                            </span>

            </p>

            <hr>

            <div class="row text-center">

              <div class="col">

                <small class="text-muted">

                  Salary

                </small>

                <h6 class="text-success">

                  ₹ <span th:text="${job.salary}">
                                        700000
                                    </span>

                </h6>

              </div>

              <div class="col">

                <small class="text-muted">

                  Experience

                </small>

                <h6
                        th:text="${job.experienceRequired}">
                  2 Years
                </h6>

              </div>

            </div>

          </div>

          <div class="card-footer bg-white border-0">

            <a
                    class="btn btn-primary w-100"
                    th:href="@{'/jobs/' + ${job.id}}">

              View Details

            </a>

          </div>

        </div>

      </div>

    </div>

  </div>

</section>

<!-- Newsletter -->

<section class="py-5 bg-primary text-white">

  <div class="container text-center">

    <h2>

      Never Miss a Job Opportunity

    </h2>

    <p>

      Subscribe and receive the latest jobs directly in your inbox.

    </p>

    <div class="row justify-content-center">

      <div class="col-lg-6">

        <div class="input-group">

          <input
                  type="email"
                  class="form-control form-control-lg"
                  placeholder="Enter your email">

          <button class="btn btn-light">

            Subscribe

          </button>

        </div>

      </div>

    </div>

  </div>

</section>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
