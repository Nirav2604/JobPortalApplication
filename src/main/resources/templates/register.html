<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

  <title>Register</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link th:href="@{/css/style.css}" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-6">

      <div class="card p-4">

        <h3 class="text-center mb-3">Create Account</h3>

        <input id="name" class="form-control mb-2" placeholder="Full Name">

        <input id="email" class="form-control mb-2" placeholder="Email">

        <input id="password" type="password" class="form-control mb-2" placeholder="Password">

        <select id="role" class="form-select mb-3">

          <option value="">Select Role</option>
          <option value="CANDIDATE">Candidate</option>
          <option value="RECRUITER">Recruiter</option>

        </select>

        <button class="btn btn-primary w-100" onclick="register()">
          Register
        </button>

        <p id="msg" class="mt-3 text-danger"></p>

      </div>

    </div>

  </div>

</div>

<script src="/js/auth.js"></script>

</body>
</html>
