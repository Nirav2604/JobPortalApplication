<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

  <meta charset="UTF-8">

  <title>My Applications</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <!-- Bootstrap Icons -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">

  <!-- Google Font -->

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

  <link rel="stylesheet"
        th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid mt-4">

  <div class="row">

    <!-- Sidebar -->

    <div class="col-lg-3">

      <div th:replace="~{fragments/sidebar :: candidateSidebar}"></div>

    </div>

    <!-- Main -->

    <div class="col-lg-9">

      <div class="card shadow border-0">

        <div class="card-header bg-primary text-white">

          <h4 class="mb-0">

            My Applications

          </h4>

        </div>

        <div class="card-body">

          <table class="table table-hover align-middle">

            <thead>

            <tr>

              <th>Job Title</th>

              <th>Company</th>

              <th>Applied On</th>

              <th>Status</th>

              <th>Action</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="application : ${applications}">

              <td th:text="${application.job.title}">

                Java Developer

              </td>

              <td th:text="${application.job.companyName}">

                TCS

              </td>

              <td th:text="${application.appliedDate}">

                01-07-2026

              </td>

              <td>

                                <span class="badge bg-warning"
                                      th:if="${application.status=='PENDING'}">

                                    Pending

                                </span>

                <span class="badge bg-success"
                      th:if="${application.status=='SHORTLISTED'}">

                                    Shortlisted

                                </span>

                <span class="badge bg-danger"
                      th:if="${application.status=='REJECTED'}">

                                    Rejected

                                </span>

                <span class="badge bg-primary"
                      th:if="${application.status=='SELECTED'}">

                                    Selected

                                </span>

              </td>

              <td>

                <a class="btn btn-sm btn-outline-primary"
                   th:href="@{'/jobs/' + ${application.job.id}}">

                  View

                </a>

                <button class="btn btn-sm btn-outline-danger">

                  Withdraw

                </button>

              </td>

            </tr>

            </tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/auth.js}"></script>

</body>

</html>
