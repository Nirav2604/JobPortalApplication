<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>My Profile</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid mt-4">

    <div class="row">

        <!-- Sidebar -->

        <div class="col-lg-3">

            <div th:replace="~{fragments/sidebar :: candidateSidebar}"></div>

        </div>

        <!-- Main Content -->

        <div class="col-lg-9">

            <div class="card shadow border-0">

                <div class="card-body">

                    <div class="row">

                        <!-- Profile Picture -->

                        <div class="col-md-3 text-center">

                            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                                 class="img-fluid rounded-circle border"
                                 width="180">

                            <h4 class="mt-3"
                                th:text="${candidate.name}">

                                John Doe

                            </h4>

                            <p class="text-muted">

                                Candidate

                            </p>

                        </div>

                        <!-- Profile Form -->

                        <div class="col-md-9">

                            <h3 class="mb-4">

                                Edit Profile

                            </h3>

                            <form th:action="@{/candidate/profile/update}"
                                  method="post">

                                <div class="row">

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Full Name

                                        </label>

                                        <input type="text"
                                               class="form-control"
                                               name="name"
                                               th:value="${candidate.name}">

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Email

                                        </label>

                                        <input type="email"
                                               class="form-control"
                                               readonly
                                               th:value="${candidate.email}">

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Phone

                                        </label>

                                        <input type="text"
                                               class="form-control"
                                               name="phone"
                                               th:value="${candidate.phone}">

                                    </div>

                                    <div class="col-md-6 mb-3">

                                        <label class="form-label">

                                            Location

                                        </label>

                                        <input type="text"
                                               class="form-control"
                                               name="location"
                                               th:value="${candidate.location}">

                                    </div>

                                    <div class="col-md-12 mb-3">

                                        <label class="form-label">

                                            Skills

                                        </label>

                                        <textarea class="form-control"
                                                  rows="3"
                                                  name="skills"
                                                  th:text="${candidate.skills}"></textarea>

                                    </div>

                                    <div class="col-md-12 mb-3">

                                        <label class="form-label">

                                            About Me

                                        </label>

                                        <textarea class="form-control"
                                                  rows="5"
                                                  name="about"
                                                  th:text="${candidate.about}"></textarea>

                                    </div>

                                </div>

                                <button class="btn btn-primary">

                                    <i class="bi bi-save"></i>

                                    Update Profile

                                </button>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

            <!-- Resume -->

            <div class="card shadow border-0 mt-4">

                <div class="card-body">

                    <h4>

                        Resume

                    </h4>

                    <p class="text-muted">

                        Upload your latest resume.

                    </p>

                    <form method="post"
                          enctype="multipart/form-data"
                          th:action="@{/candidate/upload-resume}">

                        <div class="input-group">

                            <input type="file"
                                   class="form-control"
                                   name="resume">

                            <button class="btn btn-success">

                                <i class="bi bi-upload"></i>

                                Upload

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/auth.js}"></script>

</body>

</html>
