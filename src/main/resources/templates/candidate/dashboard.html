<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

  <meta charset="UTF-8">

  <title>Candidate Dashboard</title>

  <meta name="viewport"
        content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

  <link rel="stylesheet"
        th:href="@{/css/style.css}">

</head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container-fluid mt-4">

  <div class="row">

    <!-- Sidebar -->

    <div class="col-lg-3">

      <div th:replace="~{fragments/sidebar :: candidateSidebar}"></div>

    </div>

    <!-- Main -->

    <div class="col-lg-9">

      <h2 class="fw-bold mb-4">

        Candidate Dashboard

      </h2>

      <div class="row">

        <div class="col-md-4 mb-4">

          <div class="card border-0 shadow">

            <div class="card-body text-center">

              <i class="bi bi-file-earmark-check display-4 text-primary"></i>

              <h2 class="mt-3">

                12

              </h2>

              <p>

                Applications

              </p>

            </div>

          </div>

        </div>

        <div class="col-md-4 mb-4">

          <div class="card border-0 shadow">

            <div class="card-body text-center">

              <i class="bi bi-briefcase display-4 text-success"></i>

              <h2 class="mt-3">

                56

              </h2>

              <p>

                Available Jobs

              </p>

            </div>

          </div>

        </div>

        <div class="col-md-4 mb-4">

          <div class="card border-0 shadow">

            <div class="card-body text-center">

              <i class="bi bi-check-circle display-4 text-warning"></i>

              <h2 class="mt-3">

                5

              </h2>

              <p>

                Shortlisted

              </p>

            </div>

          </div>

        </div>

      </div>

      <!-- Recent Applications -->

      <div class="card shadow border-0">

        <div class="card-header bg-white">

          <h5 class="mb-0">

            Recent Applications

          </h5>

        </div>

        <div class="card-body">

          <table class="table table-hover">

            <thead>

            <tr>

              <th>Job</th>

              <th>Company</th>

              <th>Status</th>

            </tr>

            </thead>

            <tbody>

            <tr>

              <td>Java Developer</td>

              <td>TCS</td>

              <td>

                                <span class="badge bg-warning">

                                    Pending

                                </span>

              </td>

            </tr>

            <tr>

              <td>Backend Developer</td>

              <td>Infosys</td>

              <td>

                                <span class="badge bg-success">

                                    Shortlisted

                                </span>

              </td>

            </tr>

            </tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:src="@{/js/auth.js}"></script>

</body>

</html>
